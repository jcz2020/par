name: opam publish

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  opam-archive:
    name: Build opam archive
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.0"
          dune-cache: true
          opam-local-packages: |
            par.opam
            par_cli.opam

      - run: opam install par_cli --deps-only -y

      - run: opam exec -- dune build

      - name: Generate opam files
        run: opam exec -- dune build par.opam par_cli.opam

      - name: Create source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="par-${VERSION}/" -o "par-${VERSION}.tar.gz" HEAD

      - name: Generate SHA-512 checksums
        run: sha512sum par-*.tar.gz > sha512-checksums.txt

      - name: Upload opam archive to existing GH Release
        # NOTE: do NOT use softprops/action-gh-release@v2 here — that would race
        # with release.yml's release job over who creates the release first.
        # release.yml is the sole release creator. This step only uploads assets.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Wait for release.yml to create the release (race-safe)
          for i in {1..30}; do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release $TAG not yet created, retrying in 10s ($i/30)..."
            sleep 10
          done
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            par-*.tar.gz \
            _build/default/par.opam \
            _build/default/par_cli.opam \
            sha512-checksums.txt

      - name: Print manual instructions
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Archive uploaded to GitHub Release."
          echo "To submit to opam-repository:"
          echo "  1. Fork opam-repository"
          echo "  2. Create packages/par.${VERSION}/opam and packages/par_cli.${VERSION}/opam"
          echo "  3. Set url.src and url.checksum from the attached tarball"
          echo "  4. Open a PR to opam-repository"
