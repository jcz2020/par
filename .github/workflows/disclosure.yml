name: Disclosure Check

# Enforces the No Downstream Identifiable Information rule from AGENTS.md.
# Blocks PRs that add forbidden partner identifiers (project names, company
# names, internal agent identifiers) to any tracked artifact.
#
# Two-tier denylist (see scripts/check_disclosure.sh):
# - Public denylist: hardcoded in the script (already-leaked identifiers)
# - Private denylist: injected via DISCLOSURE_DENYLIST_EXTRA repo secret
#   (for partner names that have never been committed). Maintainer-only.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: disclosure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Disclosure check on PR diff
        if: github.event_name == 'pull_request'
        env:
          DISCLOSURE_DENYLIST_EXTRA: ${{ secrets.DISCLOSURE_DENYLIST_EXTRA }}
        run: |
          bash scripts/check_disclosure.sh --against=origin/${{ github.base_ref }}

      - name: Disclosure check on push to main
        if: github.event_name == 'push'
        env:
          DISCLOSURE_DENYLIST_EXTRA: ${{ secrets.DISCLOSURE_DENYLIST_EXTRA }}
        run: |
          bash scripts/check_disclosure.sh --against=HEAD~1

      - name: Self-test (always run — catches script regressions)
        run: |
          bash scripts/check_disclosure.sh --self-test
