name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes from CHANGES.md
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NUM="${VERSION#v}"
          SECTION=$(awk -v v="$VERSION_NUM" '
            /^## v/ { if (in_section) exit; if ($0 ~ "## v"v) { in_section=1; next } }
            in_section { print }
          ' CHANGES.md)
          if [ -z "$SECTION" ]; then
            SECTION="(No changelog entry found for $VERSION_NUM)"
          fi
          echo "$SECTION" > release-notes.md
          cat >> release-notes.md << 'INSTALL_EOF'

          ---

          ## Install

          PAR SDK is a library. Pick your install:

          ```bash
          # Python
          pip install par-runtime

          # OCaml
          opam install par
          ```

          Or use the interactive SDK installer wizard:

          ```bash
          curl -fsSL https://raw.githubusercontent.com/jcz2020/par/main/install.sh | bash
          ```

          Full changelog: https://github.com/jcz2020/par/blob/main/CHANGES.md
          INSTALL_EOF

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
