name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ocaml:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, macos-13]
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.0
          dune-cache: true
          opam-local-packages: |
            *.opam
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest
      - uses: actions/upload-artifact@v4
        with:
          name: par-capi-${{ matrix.os }}
          path: _build/default/lib/ffi/par_capi.so

  python:
    needs: ocaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: par-capi-ubuntu-latest
          path: _build/default/lib/ffi/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: cd bindings/python && python3 -m pytest tests/ -v
