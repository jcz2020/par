name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  ocaml:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-latest]
        # macos-13 (Intel x64) removed 2026-06-19: free-tier Intel runners queue 24h+
        # then hit max-execution-time. Do NOT re-add — permanently abandoned per user.
    steps:
      - uses: actions/checkout@v4
      - name: Validate version
        run: |
          make validate-version
          make check-version-sync
      - uses: ocaml/setup-ocaml@v3
        with:
          # Windows uses MinGW-w64 port (broadest package ecosystem).
          ocaml-compiler: ${{ runner.os == 'Windows' && '5.3.0+mingw64c' || '5.4.0' }}
          dune-cache: true
          opam-local-packages: |
            par.opam
      # Note: par_postgres.opam is intentionally excluded from CI.
      # It depends on the `postgresql` package, which is not in the standard
      # opam repository. par_postgres is published as a separate opam package
      # (v0.4 onward). CLI was removed in v0.6.7 (product UX lives in PAR Code).
      - run: opam install . --deps-only --with-test --no-depexts
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest
      - name: Capture test count
        if: always()
        run: |
          VERSION=$(sed -n 's/^(version "\([^"]*\)").*/\1/p' dune-project)
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: par-capi-${{ matrix.os }}
          path: _build/default/lib/ffi/par_capi.so
