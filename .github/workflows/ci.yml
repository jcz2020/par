name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  ocaml:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-latest]
        # macos-13 (Intel x64) removed 2026-06-19: free-tier Intel runners queue 24h+
        # then hit max-execution-time. Do NOT re-add — permanently abandoned per user.
    steps:
      - uses: actions/checkout@v4
      - name: Validate version
        run: |
          make validate-version
          make check-version-sync
      - uses: ocaml/setup-ocaml@v3
        with:
          # Windows uses MinGW-w64 port (broadest package ecosystem).
          ocaml-compiler: ${{ runner.os == 'Windows' && '5.3.0+mingw64c' || '5.4.0' }}
          dune-cache: true
          opam-local-packages: |
            par.opam
      # Note: par_postgres.opam is intentionally excluded from CI.
      # It depends on the `postgresql` package, which is not in the standard
      # opam repository. par_postgres is published as a separate opam package
      # (v0.4 onward). CLI was removed in v0.6.7 (product UX lives in PAR Code).
      - run: opam install par --deps-only --with-test
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest
      - name: Capture test count
        if: always()
        run: |
          VERSION=$(sed -n 's/^(version "\([^"]*\)").*/\1/p' dune-project)
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: par-capi-${{ matrix.os }}
          path: _build/default/lib/ffi/par_capi.so

  python:
    needs: ocaml
    runs-on: ubuntu-22.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Test on all supported Python versions (pyproject.toml declares >=3.8).
        # ctypes is version-agnostic, but Python 3.13 changed RTLD_GLOBAL default
        # and PyPy has its own quirks — worth catching regressions.
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', 'pypy3.10']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: par-capi-ubuntu-22.04
          path: _build/default/lib/ffi/
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: cd bindings/python && python3 -m pytest tests/ -v
