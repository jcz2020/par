name: PyPI publish

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.0"
          dune-cache: true
          opam-local-packages: |
            par.opam
            par_cli.opam

      - run: opam install par_cli --deps-only -y

      - name: Build C FFI shared library
        run: opam exec -- dune build lib/ffi/par_capi.so

      - name: Copy shared library for wheel
        run: |
          mkdir -p bindings/python/par_runtime/lib
          cp -f _build/default/lib/ffi/par_capi.so bindings/python/par_runtime/lib/

      - name: Upgrade setuptools and wheel for PEP 621 support
        # The system pip on ubuntu-22.04 has setuptools 59.6.0 (no PEP 621 support),
        # and `pip install --upgrade` cannot replace system packages when site-packages
        # is read-only (it falls back to user install which is not picked up by subsequent
        # `pip wheel` invocations). Use a venv to guarantee a modern setuptools.
        run: |
          python3 -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip setuptools wheel

      - name: Build Python wheel
        run: |
          cd bindings/python
          /tmp/wheel-venv/bin/pip wheel . -w dist/ --no-deps

      - name: Generate SHA-512 checksums
        run: |
          cd bindings/python
          sha512sum dist/*.whl > dist/sha512-checksums.txt

      - name: Upload wheel to existing GH Release
        # NOTE: do NOT use softprops/action-gh-release@v2 here — that would race
        # with release.yml's release job over who creates the release first.
        # release.yml is the sole release creator. This step only uploads assets.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Wait for release.yml to create the release (race-safe)
          for i in {1..30}; do
            if gh release view "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release ${{ github.ref_name }} not yet created, retrying in 10s ($i/30)..."
            sleep 10
          done
          gh release upload "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            bindings/python/dist/*.whl \
            bindings/python/dist/sha512-checksums.txt

      - name: Print manual upload command
        run: |
          echo "Wheel uploaded to GitHub Release."
          echo "Upload to PyPI: twine upload bindings/python/dist/*.whl"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-dist
          path: bindings/python/dist/
          if-no-files-found: error

  pypi-upload:
    # Automated PyPI upload via OIDC trusted publisher.
    # Setup (one-time, user-side):
    #   1. Visit https://pypi.org/manage/project/par-runtime/settings/publishing/
    #   2. Add GitHub trusted publisher:
    #      - PyPI Project Name: par-runtime
    #      - Owner: jcz2020
    #      - Repository name: par
    #      - Workflow name: pypi-publish.yml
    #      - Environment name: pypi
    #   3. Create GitHub environment 'pypi' in repo Settings > Environments
    #   4. (Optional) Add yourself as required reviewer for first few publishes
    # Until this is done, this job will fail with 403 — that is expected.
    # The Print manual upload command above is the fallback.
    name: Publish to PyPI (OIDC)
    needs: build-wheel
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
