name: PyPI publish

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64:latest
            python_bin: /opt/python/cp311-cp311/bin/python
            repair_tool: auditwheel
            repair_args: --plat manylinux_2_28_x86_64
            artifact: wheel-linux-x86_64
          - label: linux-aarch64
            runner: ubuntu-22.04
            container:
              image: quay.io/pypa/manylinux_2_28_aarch64:latest
              options: --platform linux/arm64
            python_bin: /opt/python/cp311-cp311/bin/python
            repair_tool: auditwheel
            repair_args: --plat manylinux_2_28_aarch64
            artifact: wheel-linux-aarch64
          - label: macos-arm64
            runner: macos-15
            container: ""
            python_bin: python3
            repair_tool: delocate
            repair_args: ""
            artifact: wheel-macos-arm64
    container: ${{ matrix.container != '' && matrix.container || null }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          dnf install -y gmp-devel sqlite-devel git perl bubblewrap \
            libffi-devel openssl-devel

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gmp sqlite3 pkg-config openssl@3

      - uses: ocaml/setup-ocaml@v3
        if: matrix.label != 'linux-aarch64'
        with:
          ocaml-compiler: "5.4.0"
          dune-cache: true
          opam-local-packages: |
            par.opam
            par_cli.opam

      - name: Install OCaml + opam inside aarch64 container (cross-arch workaround)
        if: matrix.label == 'linux-aarch64'
        run: |
          dnf install -y ocaml opam gcc gcc-c++ make patch perl \
            libffi-devel openssl-devel gmp-devel sqlite-devel \
            libunwind-devel bzip2 tar
          opam init --bare --disable-sandboxing -y
          opam switch create ocaml-system ocaml-base-compiler
          eval $(opam env --switch=ocaml-system)
          opam install dune -y
          opam install par_cli --deps-only --no-depexts -y

      - name: Install PAR deps via opam
        if: matrix.label != 'linux-aarch64'
        run: opam install par_cli --deps-only -y

      - name: Build C FFI shared library
        run: opam exec -- dune build lib/ffi/par_capi.so

      - name: Copy shared library for wheel
        run: |
          mkdir -p bindings/python/par_runtime/lib
          cp -f _build/default/lib/ffi/par_capi.so bindings/python/par_runtime/lib/

      - name: Setup Python venv + build tools
        run: |
          ${{ matrix.python_bin }} -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip setuptools wheel auditwheel delocate

      - name: Build wheel (no isolation — needs in-place par_capi.so)
        run: |
          cd bindings/python
          /tmp/wheel-venv/bin/pip wheel . --no-build-isolation -w /tmp/raw-wheel/ --no-deps

      - name: Repair wheel with ${{ matrix.repair_tool }}
        run: |
          mkdir -p /tmp/final-wheel
          if [ "${{ matrix.repair_tool }}" = "auditwheel" ]; then
            /tmp/wheel-venv/bin/auditwheel repair \
              ${{ matrix.repair_args }} \
              -w /tmp/final-wheel \
              /tmp/raw-wheel/*.whl
          else
            # delocate: copy bundled libs into the wheel and rewrite Mach-O load paths
            /tmp/wheel-venv/bin/delocate-wheel -w /tmp/final-wheel /tmp/raw-wheel/*.whl
            # Rename wheel to canonical macosx_11_0_arm64 tag (delocate preserves source tag
            # which may be "macosx_*_x86_64" if local Python arch != arm64).
            cd /tmp/final-wheel
            for whl in *.whl; do
              if [[ "$whl" != *"macosx_11_0_arm64"* ]]; then
                newname=$(echo "$whl" | sed -E 's/macosx_[0-9]+_[0-9]+_(x86_64|arm64)/macosx_11_0_arm64/')
                if [ "$newname" != "$whl" ]; then
                  mv -f "$whl" "$newname"
                  echo "Renamed: $whl -> $newname"
                fi
              fi
            done
          fi
          ls -la /tmp/final-wheel/

      - name: Stage final wheel + checksums
        run: |
          mkdir -p bindings/python/dist
          cp -f /tmp/final-wheel/*.whl bindings/python/dist/
          cd bindings/python/dist
          sha512sum *.whl > sha512-checksums.txt
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bindings/python/dist/
          if-no-files-found: error

  gh-release-upload:
    name: Upload all wheels to GH Release
    needs: build-wheel
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-aarch64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist/
      - name: Merge checksums + show summary
        run: |
          cd dist
          # Concatenate per-artifact sha512 lists into a single file
          cat sha512-checksums.txt > ../sha512-checksums-merged.txt 2>/dev/null || true
          for f in sha512-checksums.txt; do cat "$f" >> ../sha512-checksums-merged.txt; done
          rm -f sha512-checksums.txt
          mv -f ../sha512-checksums-merged.txt sha512-checksums.txt
          ls -la
      - name: Wait for release to exist, then upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if gh release view "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release ${{ github.ref_name }} not yet created, retrying in 10s ($i/30)..."
            sleep 10
          done
          gh release upload "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            dist/*.whl \
            dist/sha512-checksums.txt

  pypi-upload:
    name: Publish all wheels to PyPI (OIDC)
    needs: build-wheel
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-aarch64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
