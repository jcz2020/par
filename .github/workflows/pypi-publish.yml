name: PyPI publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    # Manual trigger for validation without tag push. The publish jobs
    # (gh-release-upload, pypi-upload) are guarded by `if:` conditions
    # so a manual run only builds wheels + uploads workflow artifacts,
    # letting us validate the build matrix before tagging.

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            container: quay.io/pypa/manylinux_2_28_x86_64:latest
            python_bin: /opt/python/cp311-cp311/bin/python
            repair_tool: auditwheel
            repair_args: --plat manylinux_2_28_x86_64
            vendor_dir: linux-x86_64
            vec0_ext: so
            artifact: wheel-linux-x86_64
          - label: macos-arm64
            runner: macos-15
            container: ""
            python_bin: python3
            repair_tool: delocate
            repair_args: ""
            vendor_dir: macos-aarch64
            vec0_ext: dylib
            artifact: wheel-macos-arm64
    container: ${{ matrix.container != '' && matrix.container || null }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          dnf install -y gmp-devel sqlite-devel git perl bubblewrap \
            libffi-devel openssl-devel rsync
          # rsync is required by opam 2.x for source copy of file:// URLs
          # when sandboxing is disabled. manylinux_2_28 is a minimal image
          # and does not preinstall it. macOS runners have rsync built in.

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gmp sqlite3 pkg-config openssl@3

      # Disable opam sandboxing inside containers — bwrap requires
      # unshare(CLONE_NEWNS) which is forbidden in unprivileged OCI
      # containers. This is the canonical fix per setup-ocaml docs:
      # https://github.com/ocaml/setup-ocaml#opam-disable-sandboxing
      # We also set it on macOS for parity (no-op there in practice).
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.0"
          dune-cache: true
          opam-disable-sandboxing: true
          opam-local-packages: |
            par.opam

      - name: Install PAR deps via opam
        run: opam install par --deps-only -y

      - name: Build C FFI shared library
        run: opam exec -- dune build lib/ffi/par_capi.so

      - name: Stage shared library + sqlite-vec extension
        run: |
          set -euo pipefail
          mkdir -p bindings/python/par_runtime/lib
          cp -f _build/default/lib/ffi/par_capi.so bindings/python/par_runtime/lib/

          # vec0 is a vendored pre-built binary under vendor/sqlite-vec/.
          # Source it directly instead of routing through dune — vec0 is
          # not a build artifact, and the dune rules that used to copy it
          # into _build/ were dead code (no stanza depended on them).
          vec_src="vendor/sqlite-vec/${{ matrix.vendor_dir }}/vec0.${{ matrix.vec0_ext }}"
          if [ -f "$vec_src" ]; then
            cp -f "$vec_src" bindings/python/par_runtime/lib/
          else
            echo "ERROR: vec0.${{ matrix.vec0_ext }} missing at $vec_src"
            echo "Vendor directory contents:"
            ls -la "vendor/sqlite-vec/${{ matrix.vendor_dir }}/" 2>&1 || true
            echo
            echo "All vendor dirs:"
            ls vendor/sqlite-vec/ 2>&1 || true
            exit 1
          fi
          ls -la bindings/python/par_runtime/lib/

      - name: Setup Python venv + build tools
        run: |
          ${{ matrix.python_bin }} -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip setuptools wheel auditwheel delocate

      - name: Build wheel (no isolation — needs in-place par_capi.so)
        run: |
          cd bindings/python
          /tmp/wheel-venv/bin/pip wheel . --no-build-isolation -w /tmp/raw-wheel/ --no-deps

      - name: Repair wheel with ${{ matrix.repair_tool }}
        run: |
          mkdir -p /tmp/final-wheel
          if [ "${{ matrix.repair_tool }}" = "auditwheel" ]; then
            /tmp/wheel-venv/bin/auditwheel repair \
              ${{ matrix.repair_args }} \
              -w /tmp/final-wheel \
              /tmp/raw-wheel/*.whl
          else
            # delocate: copy bundled libs into the wheel and rewrite Mach-O load paths
            /tmp/wheel-venv/bin/delocate-wheel -w /tmp/final-wheel /tmp/raw-wheel/*.whl
            # Source wheel has 'py3-none-any' tag (ctypes .so isn't a real CPython ext).
            # Use `wheel tags` to set the platform tag — this rewrites both the filename
            # and the internal WHEEL metadata's Tag field.
            cd /tmp/final-wheel
            /tmp/wheel-venv/bin/wheel tags --remove --platform-tag macosx_11_0_arm64 *.whl
          fi
          ls -la /tmp/final-wheel/

      - name: Stage final wheel + checksums
        run: |
          mkdir -p bindings/python/dist
          cp -f /tmp/final-wheel/*.whl bindings/python/dist/
          cd bindings/python/dist
          sha512sum *.whl > sha512-checksums.txt
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bindings/python/dist/
          if-no-files-found: error

  gh-release-upload:
    name: Upload all wheels to GH Release
    needs: build-wheel
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/linux-x86_64/
      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist/macos-arm64/
      - name: Merge checksums + show summary
        run: |
          cd dist
          cat linux-x86_64/sha512-checksums.txt > sha512-checksums.txt 2>/dev/null || true
          cat macos-arm64/sha512-checksums.txt >> sha512-checksums.txt 2>/dev/null || true
          # Move wheels to dist/ root so `gh release upload dist/*.whl` finds
          # them. download-artifact preserves the artifact name as a subdir,
          # so without this flatten step the glob doesn't match.
          mv linux-x86_64/*.whl . 2>/dev/null || true
          mv macos-arm64/*.whl . 2>/dev/null || true
          ls -la
      - name: Wait for release to exist, then upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if gh release view "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release ${{ github.ref_name }} not yet created, retrying in 10s ($i/30)..."
            sleep 10
          done
          gh release upload "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            dist/*.whl \
            dist/sha512-checksums.txt

  pypi-upload:
    name: Publish all wheels to PyPI (OIDC)
    needs: build-wheel
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
