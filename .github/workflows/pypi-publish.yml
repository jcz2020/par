name: PyPI publish

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.0"
          dune-cache: true
          opam-local-packages: |
            *.opam

      - run: opam install par_cli --deps-only -y

      - name: Build C FFI shared library
        run: opam exec -- dune build lib/ffi/par_capi.so

      - name: Copy shared library for wheel
        run: |
          mkdir -p bindings/python/par_runtime/lib
          cp -f _build/default/lib/ffi/par_capi.so bindings/python/par_runtime/lib/

      - name: Upgrade setuptools and wheel for PEP 621 support
        # The system pip on ubuntu-22.04 has setuptools 59.6.0 (no PEP 621 support),
        # and `pip install --upgrade` cannot replace system packages when site-packages
        # is read-only (it falls back to user install which is not picked up by subsequent
        # `pip wheel` invocations). Use a venv to guarantee a modern setuptools.
        run: |
          python3 -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip setuptools wheel

      - name: Build Python wheel
        run: |
          cd bindings/python
          /tmp/wheel-venv/bin/pip wheel . -w dist/ --no-deps

      - name: Generate SHA-512 checksums
        run: |
          cd bindings/python
          sha512sum dist/*.whl > dist/sha512-checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            bindings/python/dist/*.whl
            bindings/python/dist/sha512-checksums.txt

      - name: Print manual upload command
        run: |
          echo "Wheel uploaded to GitHub Release."
          echo "Upload to PyPI: twine upload bindings/python/dist/*.whl"
