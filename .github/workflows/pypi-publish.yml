name: PyPI publish

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-wheel:
    name: Build manylinux_2_28 wheel
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for OCaml
        run: dnf install -y gmp-devel sqlite-devel git perl bubblewrap

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4.0"
          dune-cache: true
          opam-local-packages: |
            par.opam
            par_cli.opam

      - name: Install PAR deps
        run: opam install par_cli --deps-only -y

      - name: Build C FFI shared library
        run: opam exec -- dune build lib/ffi/par_capi.so

      - name: Copy shared library for wheel
        run: |
          mkdir -p bindings/python/par_runtime/lib
          cp -f _build/default/lib/ffi/par_capi.so bindings/python/par_runtime/lib/

      - name: Setup Python + build tools
        run: |
          /opt/python/cp311-cp311/bin/python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install --upgrade pip setuptools wheel auditwheel

      - name: Build wheel (no isolation — needs in-place par_capi.so)
        run: |
          cd bindings/python
          /tmp/wheel-venv/bin/pip wheel . --no-build-isolation -w /tmp/raw-wheel/ --no-deps

      - name: Repair wheel with auditwheel (manylinux_2_28)
        # auditwheel bundles GMP and sqlite3 (the only non-glibc deps of
        # par_capi.so) into the wheel and tags it manylinux_2_28_x86_64.
        # The _loader.c dummy extension makes par_capi.so visible to
        # auditwheel's DT_NEEDED scanner (pypa/auditwheel#197).
        run: |
          mkdir -p /tmp/final-wheel
          /tmp/wheel-venv/bin/auditwheel repair \
            --plat manylinux_2_28_x86_64 \
            -w /tmp/final-wheel \
            /tmp/raw-wheel/*.whl
          ls -la /tmp/final-wheel/

      - name: Stage final wheel + checksums
        run: |
          mkdir -p bindings/python/dist
          cp -f /tmp/final-wheel/*.whl bindings/python/dist/
          cd bindings/python/dist
          sha512sum *.whl > sha512-checksums.txt
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-dist
          path: bindings/python/dist/
          if-no-files-found: error

  gh-release-upload:
    name: Upload wheel to GH Release
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-dist
          path: dist/
      - name: Wait for release to exist, then upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if gh release view "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release ${{ github.ref_name }} not yet created, retrying in 10s ($i/30)..."
            sleep 10
          done
          gh release upload "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            dist/*.whl \
            dist/sha512-checksums.txt

  pypi-upload:
    name: Publish to PyPI (OIDC)
    needs: build-wheel
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheel-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
